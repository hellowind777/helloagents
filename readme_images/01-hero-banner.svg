<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" role="img" aria-labelledby="banner-title">
  <defs>
    <linearGradient id="hero-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="40%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <radialGradient id="glow-1" cx="0.2" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-2" cx="0.8" cy="0.7" r="0.4">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="800" height="240" rx="0" fill="url(#hero-grad)"/>
  <rect width="800" height="240" rx="0" fill="url(#grid)"/>
  <rect width="800" height="240" rx="0" fill="url(#glow-1)"/>
  <rect width="800" height="240" rx="0" fill="url(#glow-2)"/>

  <!-- Decorative rings -->
  <circle cx="90" cy="90" r="70" fill="none" stroke="rgba(99,102,241,0.08)" stroke-width="1"/>
  <circle cx="90" cy="90" r="55" fill="none" stroke="rgba(139,92,246,0.12)" stroke-width="1.5"/>
  <circle cx="90" cy="90" r="40" fill="rgba(99,102,241,0.1)"/>

  <!-- Logo mark: abstract "HA" monogram -->
  <text x="90" y="98" fill="url(#accent-grad)" font-size="42" font-family="system-ui,-apple-system,sans-serif" font-weight="800" text-anchor="middle" letter-spacing="-1">HA</text>

  <!-- Main title -->
  <text x="180" y="88" fill="#f1f5f9" font-size="44" font-family="system-ui,-apple-system,sans-serif" font-weight="700" letter-spacing="-0.5">Hello<tspan fill="url(#accent-grad)">AGENTS</tspan></text>

  <!-- Subtitle -->
  <text x="180" y="126" fill="#94a3b8" font-size="17" font-family="system-ui,-apple-system,sans-serif" font-weight="400">Quality-driven orchestration kernel for AI coding CLIs</text>

  <!-- Feature tags -->
  <rect x="180" y="150" width="138" height="26" rx="13" fill="rgba(99,102,241,0.15)"/>
  <text x="249" y="168" fill="#a5b4fc" font-size="12" font-family="system-ui,-apple-system,sans-serif" font-weight="500" text-anchor="middle">14 Auto Skills</text>

  <rect x="326" y="150" width="118" height="26" rx="13" fill="rgba(139,92,246,0.15)"/>
  <text x="385" y="168" fill="#c4b5fd" font-size="12" font-family="system-ui,-apple-system,sans-serif" font-weight="500" text-anchor="middle">QA Gate System</text>

  <rect x="452" y="150" width="108" height="26" rx="13" fill="rgba(168,85,247,0.12)"/>
  <text x="506" y="168" fill="#d8b4fe" font-size="12" font-family="system-ui,-apple-system,sans-serif" font-weight="500" text-anchor="middle">Safety Guard</text>

  <!-- Version badge -->
  <rect x="620" y="54" width="58" height="22" rx="11" fill="rgba(255,255,255,0.08)"/>
  <text x="649" y="69" fill="#64748b" font-size="11" font-family="system-ui,-apple-system,sans-serif" font-weight="500" text-anchor="middle">v3.1.5</text>

  <!-- Bottom decorative line -->
  <rect x="0" y="237" width="800" height="3" fill="url(#accent-grad)" opacity="0.6"/>
</svg>