<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#f97316" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <!-- Claude Code -->
    <rect x="6" y="20" width="20" height="10" rx="3" fill="#6366f1" opacity="0.85"/>
    <text x="16" y="28" fill="#fff" font-size="7" font-family="system-ui,sans-serif" font-weight="700" text-anchor="middle">CC</text>
    <!-- Gemini -->
    <rect x="6" y="34" width="20" height="10" rx="3" fill="#8b5cf6" opacity="0.7"/>
    <text x="16" y="42" fill="#fff" font-size="7" font-family="system-ui,sans-serif" font-weight="700" text-anchor="middle">GC</text>
    <!-- Codex -->
    <rect x="6" y="48" width="20" height="10" rx="3" fill="#a78bfa" opacity="0.55"/>
    <text x="16" y="56" fill="#fff" font-size="7" font-family="system-ui,sans-serif" font-weight="700" text-anchor="middle">CX</text>
    <!-- Checkmarks -->
    <path d="M36 26l4 4 7-8" fill="none" stroke="url(#fg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M36 40l4 4 7-8" fill="none" stroke="url(#fg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <path d="M36 54l4 4 7-8" fill="none" stroke="url(#fg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
  </g>
</svg>